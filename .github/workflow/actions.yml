name: PeachStreet frontend CI/CD Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

      - name: Automatic Tagging of Realeses
        id: incremental-git-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash ./build/git_update.sh -v patch
          echo "Tag output:"
          cat $GITHUB_OUTPUT

      - name: Build, Tag, and Push Docker Image to ECR
        id: build-image
        env: 
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: peachstreet
          REACT_APP_HELIX_API: ${{ secrets.REACT_APP_HELIX_API }}
          REACT_APP_OWNER_ACC: ${{ vars.REACT_APP_OWNER_ACC }}
          REACT_APP_SECONDARY_THEME_COLOR: ${{ vars.REACT_APP_SECONDARY_THEME_COLOR }}
          REACT_APP_STRIPE_PUBLISHED_KEY: ${{ vars.REACT_APP_STRIPE_PUBLISHED_KEY }}
          REACT_APP_TENANT_ACC: ${{ vars.REACT_APP_TENANT_ACC }}
          REACT_APP_THE_COLOR: ${{ vars.REACT_APP_THE_COLOR }}

          IMAGE_TAG: ${{ steps.incremental-git-tag.outputs.git-tag }}
        run: |
          echo "ECR_REGISTRY: $ECR_REGISTRY"
          echo "ECR_REPOSITORY: $ECR_REPOSITORY"
          echo "IMAGE_TAG: $IMAGE_TAG"
          
          if [ -z "$ECR_REGISTRY" ]; then
            echo "ERROR: ECR_REGISTRY is empty"
            exit 1
          fi
          if [ -z "$IMAGE_TAG" ]; then
            echo "ERROR: IMAGE_TAG is empty"
            exit 1
          fi
          
          docker build \
            --build-arg REACT_APP_HELIX_API="$REACT_APP_HELIX_API" \
            --build-arg REACT_APP_OWNER_ACC="$REACT_APP_OWNER_ACC" \
            --build-arg REACT_APP_SECONDARY_THEME_COLOR="$REACT_APP_SECONDARY_THEME_COLOR" \
            --build-arg REACT_APP_STRIPE_PUBLISHED_KEY="$REACT_APP_STRIPE_PUBLISHED_KEY" \
            --build-arg REACT_APP_TENANT_ACC="$REACT_APP_TENANT_ACC" \
            --build-arg REACT_APP_THE_COLOR="$REACT_APP_THE_COLOR" \
            --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT